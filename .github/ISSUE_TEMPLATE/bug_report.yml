name: Bug report
description: Report a bug or unexpected behaviour in MCPTune
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more concrete the reproduction, the faster we can help.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code snippet that reproduces the issue. If possible, include a small FastMCP server that triggers it.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error message and traceback if applicable.
    validations:
      required: true

  - type: input
    id: mcptune-version
    attributes:
      label: MCPTune version or commit SHA
      placeholder: e.g. 0.1.0 or abc1234
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.3
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04 / macOS 14 / Windows 11 (WSL2)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: MCP server type, transport in use, anything else relevant.